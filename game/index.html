<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NanaCarRace</title>
  <link rel="stylesheet" href="../css/game.css">
</head>
<body>
  <div id="container">
    <header>
      <h1>NanaCarRace</h1>
      <div id="hud" role="status" aria-live="polite">Score: <span id="score">0</span></div>
      <a class="btn" href="../" id="back-btn" aria-label="Back to projects">Back</a>
    </header>
    <canvas id="gameCanvas" width="360" height="640" tabindex="0" aria-label="NanaCarRace game canvas"></canvas>
    <div id="controls">Use ← and → to steer. Press Space or Enter to restart.</div>
    <div id="touch-controls" aria-hidden="true" style="display:none;">
      <button id="touch-left" class="touch-btn">◀</button>
      <button id="touch-right" class="touch-btn">▶</button>
    </div>
  </div>
  <script src="../js/game.js"></script>
</body>
</html>
